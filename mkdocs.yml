site_name: DriftWatch
site_description: Real-time data drift detection for deployed machine learning systems
site_author: DriftWatch Contributors
repo_url: https://github.com/yourusername/driftwatch
repo_name: driftwatch

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true
      toc_depth: 3

plugins:
  - search

copyright: Copyright &copy; 2026 DriftWatch Contributors

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yourusername/driftwatch
  generator: false


nav:
  - Home: README.md
  - Getting Started: getting-started.md
  - Usage Guide: usage_guide.md
  - API Reference: api_reference.md
  - Benchmarks: benchmarks.md
  - Research Note: RESEARCH_NOTE.md
  - Notebook: notebook-guide.md
